<div class="playlist-picker-backdrop" (click)="closed.emit()"></div>
<div class="playlist-picker">
  <h3 class="playlist-picker-title">Add to playlist</h3>

  <!-- Existing playlists -->
  <button class="playlist-picker-item" *ngFor="let p of library.playlists()" (click)="picked.emit(p.id)">
    <span class="playlist-picker-dot" [style.background]="p.coverColor"></span>
    {{ p.name }}
    <span class="playlist-picker-count">{{ p.songIds.length }} songs</span>
  </button>

  <!-- New playlist -->
  <div class="playlist-picker-new">
    <input type="text" placeholder="New playlist name" [(ngModel)]="newName" (keyup.enter)="create()" />
    <button class="playlist-picker-create" (click)="create()">Create</button>
  </div>
</div>
